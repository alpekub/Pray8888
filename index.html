<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step of Faith</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

.success {
  display: none;
  font-size: 20px;
  margin-top: 40px;
}
</style>
</head>

<body>

<h2>Step of Faith</h2>

<div id="form">
<input id="name" placeholder="Имя">
<input id="surname" placeholder="Фамилия">

<select id="country">
<option value="+7">Россия</option>
<option value="+49">Германия</option>
<option value="+44">Великобритания</option>
</select>

<input id="phone" placeholder="Телефон">

<textarea id="comment" placeholder="Ваш комментарий"></textarea>

<button onclick="submitForm()">Добавиться в группу</button>
</div>

<div class="success" id="success">
🙏 Ваша заявка отправлена на рассмотрение
</div>

<script>
async function submitForm() {

  const data = {
    name: document.getElementById('name').value,
    surname: document.getElementById('surname').value,
    country: document.getElementById('country').value,
    phone: document.getElementById('phone').value,
    comment: document.getElementById('comment').value
  };

  await fetch('/api/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>

</body>
</html>
