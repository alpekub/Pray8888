<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step of Faith</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d1b3d;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(180deg, #0d1b3d 0%, #1a2e5c 30%, #203d70 60%, #0d1b3d 100%);
            overflow: hidden;
            animation: bgShift 15s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { background: linear-gradient(180deg, #0d1b3d 0%, #1a2e5c 30%, #203d70 60%, #0d1b3d 100%); }
            50% { background: linear-gradient(180deg, #1a2e5c 0%, #203d70 30%, #254a8a 60%, #1a2e5c 100%); }
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            animation: bgMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        .wave {
            position: absolute;
            width: 200%;
            height: 120%;
            bottom: 0;
            left: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="100"><stop offset="0" stop-color="rgba(212,175,55,0.2)"/><stop offset="100" stop-color="rgba(184,134,11,0.1)"/></linearGradient></defs><path d="M0,60 Q150,30 300,60 T600,60 T900,60 T1200,60 L1200,120 L0,120 Z" fill="url(%23g)"/><path d="M0,80 Q200,50 400,80 T800,80 T1200,80 L1200,120 L0,120 Z" fill="rgba(212,175,55,0.1)"/></svg>') repeat-x;
            animation: wave 12s linear infinite;
            opacity: 0.6;
        }

        .wave:nth-child(1) { animation-delay: 0s; opacity: 0.4; animation-duration: 15s; }
        .wave:nth-child(2) { animation-delay: -5s; opacity: 0.2; animation-duration: 18s; bottom: 10px; }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            animation: float 20s infinite;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }

        /* ЭКРАН 1: ВСТУПЛЕНИЕ */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            margin-bottom: 20px;
            color: #d4af37;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: rgba(212, 175, 55, 0.9);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .welcome-button {
            padding: 14px 40px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(212,175,55,0.9) 0%, rgba(184,134,11,0.9) 100%);
            color: #0d1b3d;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
        }

        .welcome-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212,175,55,0.4);
        }

        /* ЭКРАН 2: ОПРЕДЕЛЕНИЕ */
        .detection-screen {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top-color: rgba(212, 175, 55, 0.9);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading {
            font-size: 18px;
            color: rgba(212, 175, 55, 0.9);
        }

        /* ЭКРАН 3: РЕЗУЛЬТАТ */
        .result-screen {
            display: none;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            margin-bottom: 30px;
            color: #d4af37;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .flag-container {
            margin: 40px 0;
        }

        .flag {
            font-size: 180px;
            line-height: 1;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 30px rgba(212, 175, 55, 0.3));
            animation: pulse-flag 2s ease-in-out infinite;
        }

        @keyframes pulse-flag {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .button-container {
            margin-top: 50px;
        }

        .action-button {
            width: 100%;
            padding: 16px 40px;
            border: 2px solid #d4af37;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(212,175,55,0.9) 0%, rgba(184,134,11,0.9) 100%);
            color: #0d1b3d;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            min-width: 280px;
        }

        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212,175,55,0.4);
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(135deg, #1a2e5c 0%, #203d70 100%);
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
            border: 2px solid #ff4444;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            color: #ff4444;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .modal-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-button {
            padding: 12px 30px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(212,175,55,0.9) 0%, rgba(184,134,11,0.9) 100%);
            color: #0d1b3d;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212,175,55,0.4);
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .welcome-title { font-size: 36px; }
            .title { font-size: 24px; }
            .flag { font-size: 120px; }
            .action-button { font-size: 14px; padding: 14px 30px; min-width: 240px; }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="particles" id="particlesContainer"></div>
    </div>

    <div class="container">
        <!-- ЭКРАН 1 -->
        <div class="welcome-screen" id="screen1">
            <h1 class="welcome-title">Step of Faith</h1>
            <p class="welcome-subtitle">Присоединитесь к молитвенной группе и почувствуйте силу единства</p>
            <button class="welcome-button" onclick="goToScreen2()">Продолжить</button>
        </div>

        <!-- ЭКРАН 2 -->
        <div class="detection-screen" id="screen2">
            <p class="loading"><span class="spinner"></span>Определение региона...</p>
        </div>

        <!-- ЭКРАН 3 -->
        <div class="result-screen" id="screen3">
            <h1 class="title">Step of Faith</h1>
            <div class="flag-container">
                <div class="flag" id="flagDisplay">🌍</div>
            </div>
            <div class="button-container">
                <button class="action-button" id="mainButton" onclick="checkAndProceed()">Войти в группу</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО БЛОКИРОВКИ ДЛЯ РОССИИ -->
    <div class="modal-overlay" id="blockedModal">
        <div class="modal-box">
            <div class="modal-icon">❌</div>
            <h2 class="modal-title">Доступ ограничен</h2>
            <p class="modal-text">Приложение недоступно в вашей стране</p>
            <button class="modal-button" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО БЛОКИРОВКИ ДЛЯ VPN -->
    <div class="modal-overlay" id="vpnBlockedModal">
        <div class="modal-box">
            <div class="modal-icon">🔒</div>
            <h2 class="modal-title">Доступ запрещён</h2>
            <p class="modal-text">VPN/Proxy обнаружен<br><br>Приложение недоступно при использовании VPN или прокси-сервера</p>
            <button class="modal-button" onclick="closeVpnModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // ========================================
        // ПРОВЕРКА VPN/PROXY
        // ========================================
        // Используется API: ipdata.co (бесплатный tier)
        // Документация: https://ipdata.co/
        // 
        // ВАЖНО: Замените 'test' на свой API ключ от ipdata.co
        // Получить бесплатный ключ: https://ipdata.co/
        // 
        const VPN_API_KEY = 'test';  // ← ЗАМЕНИТЕ НА СВОЙ API КЛЮЧ
        
        async function checkVPN() {
            try {
                console.log('🔍 Проверка VPN/Proxy...');
                
                const response = await fetch(`https://api.ipdata.co/?api-key=${VPN_API_KEY}`);
                const data = await response.json();
                
                console.log('VPN Check Result:', data);
                
                // Проверяем наличие VPN/Proxy
                if (data.is_vpn || data.threat?.is_vpn || data.threat?.is_proxy) {
                    console.log('⚠️ VPN/Proxy ОБНАРУЖЕН!');
                    showVpnBlockedModal();
                    return false;
                }
                
                console.log('✅ VPN/Proxy не обнаружен');
                return true;
            } catch (error) {
                console.error('❌ Ошибка при проверке VPN:', error);
                // При ошибке API позволяем доступ (лучше чем блокировать всех)
                return true;
            }
        }

        function showVpnBlockedModal() {
            // Скрываем все экраны
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen3').style.display = 'none';
            
            // Показываем модаль VPN блокировки
            document.getElementById('vpnBlockedModal').classList.add('show');
        }

        function closeVpnModal() {
            document.getElementById('vpnBlockedModal').classList.remove('show');
        }

        // ========================================
        // ФЛАГИ СТРАН
        // ========================================
        const FLAGS = {
            'RU': '🇷🇺', 'UA': '🇺🇦', 'BY': '🇧🇾', 'KZ': '🇰🇿', 'GE': '🇬🇪',
            'US': '🇺🇸', 'CA': '🇨🇦', 'MX': '🇲🇽', 'BR': '🇧🇷', 'AR': '🇦🇷',
            'GB': '🇬🇧', 'DE': '🇩🇪', 'FR': '🇫🇷', 'IT': '🇮🇹', 'ES': '🇪🇸',
            'NL': '🇳🇱', 'BE': '🇧🇪', 'CH': '🇨🇭', 'AT': '🇦🇹', 'DK': '🇩🇰',
            'SE': '🇸🇪', 'NO': '🇳🇴', 'FI': '🇫🇮', 'PL': '🇵🇱', 'CZ': '🇨🇿',
            'SK': '🇸🇰', 'HU': '🇭🇺', 'RO': '🇷🇴', 'BG': '🇧🇬', 'GR': '🇬🇷',
            'PT': '🇵🇹', 'IE': '🇮🇪', 'JP': '🇯🇵', 'CN': '🇨🇳', 'IN': '🇮🇳',
            'ZA': '🇿🇦', 'AU': '🇦🇺', 'NZ': '🇳🇿', 'SG': '🇸🇬', 'IL': '🇮🇱'
        };

        // ПЕРЕМЕННЫЕ
        let detectedCountry = null;
        let isDetecting = false;

        // ИНИЦИАЛИЗАЦИЯ
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // ========================================
        // ИНИЦИАЛИЗАЦИЯ: ПРОВЕРКА VPN ПРИ ЗАГРУЗКЕ
        // ========================================
        window.addEventListener('load', async function() {
            console.log('📱 Страница загружена, проверяем VPN...');
            const vpnCheckPassed = await checkVPN();
            
            if (!vpnCheckPassed) {
                console.log('🚫 Доступ блокирован из-за VPN');
                return;
            }
            
            console.log('✅ VPN проверка пройдена, приложение готово');
        });

        // ЭКРАН 1 → ЭКРАН 2
        function goToScreen2() {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'block';
            
            // Начать определение через 500ms
            setTimeout(detectCountry, 500);
        }

        // ОПРЕДЕЛЕНИЕ СТРАНЫ
        async function detectCountry() {
            if (isDetecting) return;  // Предотвращаем множественные вызовы
            isDetecting = true;

            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                detectedCountry = (data.country_code || 'UNKNOWN').toUpperCase();
                console.log('Определена страна:', detectedCountry);
            } catch (error) {
                console.error('Ошибка определения:', error);
                detectedCountry = 'UNKNOWN';
            }

            // ЭКРАН 2 → ЭКРАН 3
            showResult();
        }

        // ПОКАЗ РЕЗУЛЬТАТА
        function showResult() {
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen3').style.display = 'block';
            
            // Показать флаг
            const flag = FLAGS[detectedCountry] || '🌍';
            document.getElementById('flagDisplay').textContent = flag;
        }

        // НАЖАТИЕ КНОПКИ
        function checkAndProceed() {
            console.log('Проверка страны:', detectedCountry);
            
            // ЕСЛИ РОССИЯ → БЛОКИРОВКА
            if (detectedCountry === 'RU') {
                console.log('БЛОКИРОВКА: Обнаружена Россия');
                document.getElementById('blockedModal').classList.add('show');
                return;
            }

            // ВСЕ ОСТАЛЬНЫЕ → ДОСТУП
            console.log('ДОСТУП: Переход в группу');
            window.location.href = 'https://t.me/+HhAJSQSPCPE0ZDI6';
        }

        // ЗАКРЫТЬ МОДАЛЬ
        function closeModal() {
            document.getElementById('blockedModal').classList.remove('show');
        }
    </script>
</body>
</html>
