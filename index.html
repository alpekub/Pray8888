<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Входи в группу</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f0a;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
background:linear-gradient(180deg,#0a2a1a 0%,#0d4a28 30%,#0f5a32 60%,#0a3a20 100%);
}

.container{
position:relative;
z-index:10;
text-align:center;
max-width:500px;
padding:60px 40px;
}

.top-text{
font-size:12px;
letter-spacing:3px;
color:rgba(76,175,80,0.8);
margin-bottom:20px;
text-transform:uppercase;
font-weight:600;
}

.title{
font-family:'Cinzel',serif;
font-size:42px;
margin-bottom:15px;
color:#ffffff;
font-weight:700;
}

.subtitle{
font-size:16px;
color:rgba(255,255,255,0.7);
margin-bottom:50px;
line-height:1.8;
}

.button{
width:160px;
height:160px;
border-radius:50%;
background:linear-gradient(135deg,rgba(76,175,80,0.9) 0%,rgba(56,142,60,0.9) 100%);
border:3px solid rgba(255,255,255,0.2);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-family:'Cinzel',serif;
font-size:16px;
font-weight:700;
color:white;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:2px solid rgba(76,175,80,0.4);
background:rgba(76,175,80,0.08);
color:white;
margin-top:20px;
}

button.verify{
margin-top:30px;
padding:14px 30px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#4caf50,#388e3c);
color:white;
font-weight:700;
cursor:pointer;
}

.message{
margin-top:20px;
display:none;
}

.success-link{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:#4caf50;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:700;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<div id="mainScreen">

<div class="top-text">Духовное сообщество</div>
<h1 class="title">Pray Together</h1>
<p class="subtitle">Присоединитесь к молитвенной группе<br>и почувствуйте силу единства</p>

<button class="button" onclick="openForm()">
Войти<br>в группу
</button>

</div>

<div id="formScreen" style="display:none">

<div class="top-text">Духовное сообщество</div>
<h1 class="title">Входи в группу</h1>
<p class="subtitle">Введите имя для доступа</p>

<input id="userName" placeholder="Введите ваше имя">

<button class="verify" onclick="verifyAccess()">Проверить доступ</button>

<div class="message" id="successMsg"></div>
<div class="message" id="errorMsg"></div>

</div>

</div>

<script>

const RU_GROUP_URL='https://t.me/+iLu4vTE_r_9kYjNi';
const INTL_GROUP_URL='https://t.me/+HhAJSQSPCPE0ZDI6';

function openForm(){
document.getElementById("mainScreen").style.display="none";
document.getElementById("formScreen").style.display="block";
}

async function verifyAccess(){

const name=document.getElementById("userName").value.trim();
const success=document.getElementById("successMsg");
const error=document.getElementById("errorMsg");

success.style.display="none";
error.style.display="none";

if(!name){
error.innerText="Введите имя";
error.style.display="block";
return;
}

try{

const res=await fetch("https://ipapi.co/json/");
const data=await res.json();

const country=data.country_code;

if(country==="RU"){

success.innerHTML=
`<strong>Добро пожаловать, ${name}!</strong><br>
<a class="success-link" href="${RU_GROUP_URL}">Войти в группу</a>`;

success.style.display="block";

setTimeout(()=>{window.location.href=RU_GROUP_URL;},2000);

}else{

success.innerHTML=
`<strong>Добро пожаловать, ${name}!</strong><br>
<a class="success-link" href="${INTL_GROUP_URL}">Войти в группу</a>`;

success.style.display="block";

setTimeout(()=>{window.location.href=INTL_GROUP_URL;},2000);

}

}catch(e){
