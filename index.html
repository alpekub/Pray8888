<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pray Together</title>

<style>

body{
font-family:Arial;
background:#0f2d1d;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.container{
max-width:400px;
padding:40px;
}

button{
background:#4caf50;
border:none;
padding:15px 30px;
font-size:16px;
color:white;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:20px;
border-radius:8px;
border:none;
}

a{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#4caf50;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Pray Together</h1>

<p>Присоединитесь к молитвенной группе</p>

<div id="start">

<button onclick="showForm()">Войти в группу</button>

</div>

<div id="form" style="display:none">

<input id="name" placeholder="Введите ваше имя">

<br><br>

<button onclick="check()">Проверить доступ</button>

<div id="result"></div>

</div>

</div>

<script>

const RU="https://t.me/+iLu4vTE_r_9kYjNi"
const INT="https://t.me/+HhAJSQSPCPE0ZDI6"

function showForm(){
document.getElementById("start").style.display="none"
document.getElementById("form").style.display="block"
}

async function check(){

let name=document.getElementById("name").value
let result=document.getElementById("result")

if(!name){
result.innerHTML="Введите имя"
return
}

try{

let r=await fetch("https://ipapi.co/json/")
let data=await r.json()

if(data.country_code==="RU"){

result.innerHTML=`Добро пожаловать ${name}<br><a href="${RU}">Войти в группу</a>`

setTimeout(()=>{location.href=RU},2000)

}else{

result.innerHTML=`Добро пожаловать ${name}<br><a href="${INT}">Войти в группу</a>`

setTimeout(()=>{location.href=INT},2000)

}

}catch{

result.innerHTML="Ошибка подключения"

}

}

</script>

</body>
</html>
